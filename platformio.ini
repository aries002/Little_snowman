; ============================================================================
; PlatformIO Project Configuration File
;
; Project ini adalah TEMPLATE/FRAMEWORK dasar untuk perangkat ESP8266 maupun
; ESP32 dengan CLI konfigurasi lewat Serial. Pilih environment yang sesuai
; dengan board Anda menggunakan flag -e, atau lewat panel PlatformIO di
; VSCode (klik ikon PlatformIO -> Project Tasks -> pilih env -> Upload).
;
;   pio run -e esp8266 -t upload      # untuk board ESP8266
;   pio run -e esp32   -t upload      # untuk board ESP32
;   pio device monitor -b 115200      # buka serial monitor
;
; Lihat README.md untuk penjelasan lengkap.
; Dokumentasi PlatformIO: https://docs.platformio.org/page/projectconf.html
; ============================================================================

[platformio]
default_envs = esp8266

; ---------- Pengaturan yang dipakai bersama SEMUA environment ----------
[env]
framework = arduino
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson @ ^6.21.5

; ============================================================================
; Environment: ESP8266
; ============================================================================
; Board default: nodemcuv2 (NodeMCU v2/v3, Wemos D1 mini juga kompatibel).
; Ganti nilai "board" sesuai board Anda jika berbeda, lihat daftar lengkap:
; https://docs.platformio.org/en/latest/boards/index.html#espressif-8266
[env:esp8266]
platform = espressif8266
board = nodemcuv2
board_build.filesystem = littlefs
; Filter ini menerjemahkan alamat crash/stack trace ESP8266 jadi baris kode
; yang bisa dibaca -- khusus tersedia untuk platform espressif8266.
monitor_filters = esp8266_exception_decoder

; ============================================================================
; Environment: ESP32
; ============================================================================
; Board default: esp32dev (DOIT ESP32 DevKit v1, umum & murah).
; Ganti nilai "board" sesuai board Anda jika berbeda, lihat daftar lengkap:
; https://docs.platformio.org/en/latest/boards/index.html#espressif-32
[env:esp32]
platform = espressif32
board = esp32dev
board_build.filesystem = littlefs
